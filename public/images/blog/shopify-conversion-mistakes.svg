<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Red glow blob -->
  <ellipse cx="900" cy="200" rx="340" ry="260" fill="url(#redGlow)"/>

  <!-- Conversion chart (right side) -->
  <g transform="translate(620, 80)">
    <!-- Chart background -->
    <rect x="0" y="0" width="520" height="320" rx="16" fill="#13192b" stroke="#1e2640" stroke-width="1"/>
    <!-- Chart label -->
    <text x="24" y="36" font-family="monospace" font-size="11" fill="#06D6A0" font-weight="700" letter-spacing="2">CONVERSION RATE</text>
    <!-- Y-axis labels -->
    <text x="14" y="80" font-family="monospace" font-size="10" fill="#4a5568">4%</text>
    <text x="14" y="140" font-family="monospace" font-size="10" fill="#4a5568">3%</text>
    <text x="14" y="200" font-family="monospace" font-size="10" fill="#4a5568">2%</text>
    <text x="14" y="260" font-family="monospace" font-size="10" fill="#4a5568">1%</text>
    <!-- Grid lines -->
    <line x1="44" y1="75" x2="496" y2="75" stroke="#1e2640" stroke-width="1"/>
    <line x1="44" y1="135" x2="496" y2="135" stroke="#1e2640" stroke-width="1"/>
    <line x1="44" y1="195" x2="496" y2="195" stroke="#1e2640" stroke-width="1"/>
    <line x1="44" y1="255" x2="496" y2="255" stroke="#1e2640" stroke-width="1"/>
    <!-- Falling bar chart -->
    <rect x="54" y="75" width="52" height="180" fill="url(#chartGrad)" rx="4"/>
    <rect x="124" y="110" width="52" height="145" fill="url(#chartGrad)" rx="4"/>
    <rect x="194" y="148" width="52" height="107" fill="url(#chartGrad)" rx="4"/>
    <rect x="264" y="185" width="52" height="70" fill="url(#chartGrad)" rx="4"/>
    <rect x="334" y="215" width="52" height="40" fill="url(#chartGrad)" rx="4"/>
    <rect x="404" y="235" width="52" height="20" fill="url(#chartGrad)" rx="4"/>
    <!-- Trend line -->
    <polyline points="80,78 150,113 220,151 290,188 360,218 430,237" fill="none" stroke="#FF6B6B" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.8"/>
    <!-- Arrow down -->
    <polygon points="430,250 445,225 460,250" fill="#FF6B6B" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- Warning icons cluster -->
  <g transform="translate(640, 430)" opacity="0.9">
    <circle cx="0" cy="0" r="22" fill="rgba(255,107,107,0.12)" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="0" y="7" font-size="20" text-anchor="middle" fill="#FF6B6B">!</text>
    <circle cx="64" cy="0" r="22" fill="rgba(255,107,107,0.08)" stroke="#FF6B6B" stroke-width="1" opacity="0.6"/>
    <text x="64" y="7" font-size="20" text-anchor="middle" fill="#FF6B6B" opacity="0.6">!</text>
    <circle cx="120" cy="0" r="22" fill="rgba(255,107,107,0.05)" stroke="#FF6B6B" stroke-width="1" opacity="0.4"/>
    <text x="120" y="7" font-size="20" text-anchor="middle" fill="#FF6B6B" opacity="0.4">!</text>
  </g>

  <!-- Left content -->
  <!-- Category pill -->
  <rect x="60" y="80" width="140" height="30" rx="15" fill="rgba(255,107,107,0.12)" stroke="rgba(255,107,107,0.3)" stroke-width="1"/>
  <text x="130" y="100" font-family="monospace" font-size="11" fill="#FF6B6B" font-weight="700" letter-spacing="1.5" text-anchor="middle">SHOPIFY CRO</text>

  <!-- Main headline -->
  <text x="60" y="185" font-family="Georgia, serif" font-size="64" fill="#E8ECF4" font-weight="700" letter-spacing="-2">7 Shopify</text>
  <text x="60" y="258" font-family="Georgia, serif" font-size="64" fill="#E8ECF4" font-weight="700" letter-spacing="-2">Mistakes</text>
  <text x="60" y="330" font-family="Georgia, serif" font-size="64" fill="#FF6B6B" font-weight="700" letter-spacing="-2">Killing Your</text>
  <text x="60" y="400" font-family="Georgia, serif" font-size="64" fill="#FF6B6B" font-weight="700" letter-spacing="-2">Conversions</text>

  <!-- Divider -->
  <line x1="60" y1="440" x2="200" y2="440" stroke="#06D6A0" stroke-width="2" opacity="0.6"/>

  <!-- Author / meta -->
  <text x="60" y="475" font-family="monospace" font-size="13" fill="#6b7a99" letter-spacing="1">RACHNA BUILDS · SHOPIFY GUIDE</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="4" fill="url(#bg)"/>
  <rect x="0" y="626" width="420" height="4" fill="#FF6B6B" opacity="0.7"/>
  <rect x="420" y="626" width="360" height="4" fill="#06D6A0" opacity="0.5"/>
</svg>
